# ============================================================
#  CI Pipeline — bitfive monorepo  (v2)
#  Backend : /api  (TypeScript / Node.js / Express)
#  Frontend: /app  (JavaScript / React / Vite)
#
#  Jobs
#  ├── lint              → matrix: [backend, frontend]
#  ├── build             → matrix: [backend, frontend]       needs: lint
#  ├── dependency-audit  → npm audit matrix + reporte JSON   needs: lint
#  ├── dependency-review → diff de manifests en PRs          needs: lint (PR only)
#  └── semgrep           → SAST con:
#        · --verbose
#        · login condicional (SEMGREP_APP_TOKEN)
#        · reglas personalizadas (.semgrep/rules/)
#        · .semgrepignore leído automáticamente
#        · sin --error: SARIF siempre publicado → enforce al final
#
#  Política Semgrep
#  ├── PR → develop   : baseline scan (solo findings nuevos)
#  ├── push develop   : full scan (visible en Security tab)
#  ├── PR → main      : full scan estricto (bloquea DESPUÉS de publicar SARIF)
#  └── push main / release/* / hotfix/* : full scan estricto
#
#  Secrets opcionales
#  └── SEMGREP_APP_TOKEN : habilita Semgrep Cloud (login, políticas gestionadas)
#
#  Convenciones de repositorio
#  ├── .semgrep/rules/   → reglas YAML personalizadas (detectadas automáticamente)
#  └── .semgrepignore    → exclusiones Semgrep (leído automáticamente desde root)
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  dependency-audit:
    name: "Audit · ${{ matrix.name }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            path: api
          - name: frontend
            path: app

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Reporte JSON completo para archivar (no falla el step aunque haya vulns)
      - name: npm audit — reporte JSON
        run: npm audit --json > npm-audit-report.json 2>&1 || true

      # Resumen legible en el log de CI
      - name: npm audit — resumen
        run: npm audit --audit-level=info || true

      - name: Archivar reporte de auditoría
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: npm-audit-${{ matrix.name }}
          path: ${{ matrix.path }}/npm-audit-report.json
          retention-days: 14

      # Falla el job solo si hay vulnerabilidades HIGH o CRITICAL
      - name: Verificar vulnerabilidades críticas
        run: npm audit --audit-level=high

  # Revisión de cambios en manifests de dependencias (solo PRs).
  # Compara el diff de package-lock.json entre base y head.
  # No requiere npm ci — trabaja directamente sobre el diff del snapshot.
  dependency-review:
    name: "Dependency Review (PR)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Bloquea si se introducen deps con vulnerabilidades HIGH o CRITICAL
          fail-on-severity: high
          # Opcional: restringir licencias permitidas
          # allow-licenses: MIT, Apache-2.0, ISC, BSD-2-Clause, BSD-3-Clause

  # ----------------------------------------------------------
  # 4. SEMGREP SAST
  # ----------------------------------------------------------
  semgrep:
    name: "SAST · Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ── Login condicional con Semgrep Cloud ──────────────────────────
      # Configura SEMGREP_APP_TOKEN en Settings → Secrets → Actions para activar:
      #   · Políticas gestionadas desde el dashboard de Semgrep App
      #   · Sincronización de findings a Semgrep Cloud
      #   · Posibilidad de usar --config=policy en lugar de packs individuales
      #
      # Sin el token, el job continúa usando los packs públicos + reglas locales.
      # El token se pasa también como env var en los steps de scan para que
      # Semgrep lo use durante el escaneo (autenticación automática en semgrep >= 1.x).
      - name: Semgrep Login (Cloud — condicional)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          if [ -n "$SEMGREP_APP_TOKEN" ]; then
            semgrep login
            echo "SEMGREP_AUTHENTICATED=true" >> $GITHUB_ENV
            echo "✅ Autenticado con Semgrep Cloud"
          else
            echo "SEMGREP_AUTHENTICATED=false" >> $GITHUB_ENV
            echo "ℹ️  Sin SEMGREP_APP_TOKEN — usando reglas públicas y locales únicamente"
          fi

      # ── Reglas personalizadas ────────────────────────────────────────
      # Crea .semgrep/rules/ en la raíz del repo y coloca archivos YAML con
      # tus reglas. Ejemplo de estructura:
      #
      #   .semgrep/
      #   ├── rules/
      #   │   ├── no-console-log.yml
      #   │   ├── enforce-dto-validation.yml
      #   │   └── no-hardcoded-secrets.yml
      #   └── .semgrepignore   ← leído automáticamente por Semgrep
      #
      # Si .semgrep/rules/ está vacío o no existe, el flag queda vacío y
      # los scans corren solo con los packs oficiales.
      - name: Detectar reglas personalizadas
        id: custom_rules
        run: |
          CUSTOM_FLAG=""
          if [ -d ".semgrep/rules" ] && [ "$(ls -A .semgrep/rules 2>/dev/null)" ]; then
            CUSTOM_FLAG="--config=.semgrep/rules"
            echo "📁 Reglas personalizadas detectadas en .semgrep/rules/"
            ls .semgrep/rules/
          else
            echo "ℹ️  Sin reglas personalizadas (.semgrep/rules/ vacío o no encontrado)"
          fi
          echo "flag=$CUSTOM_FLAG" >> $GITHUB_OUTPUT

      # ── Política de escaneo ──────────────────────────────────────────
      - name: Determinar política
        id: policy
        run: |
          STRICT="false"
          BASELINE=""

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "main" ]; then
            STRICT="true"
          fi

          if [ "${{ github.ref }}" = "refs/heads/main" ] \
          || echo "${{ github.ref }}" | grep -qE '^refs/heads/release/|^refs/heads/hotfix/'; then
            STRICT="true"
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "develop" ]; then
            # --baseline-commit reemplaza a --baseline-ref en semgrep >= 1.x
            BASELINE="--baseline-commit=origin/develop"
          fi

          echo "strict=$STRICT"     >> $GITHUB_OUTPUT
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT

      # ── Semgrep Backend (/api) ───────────────────────────────────────
      # Packs: p/ci · p/security-audit · p/secrets · p/typescript · p/nodejs
      #
      # --verbose         : log detallado de reglas aplicadas y archivos procesados
      # sin --error       : permite que el SARIF siempre se genere y publique.
      #                     Si hay findings, el step queda en outcome='failure'
      #                     pero continue-on-error:true permite continuar hacia
      #                     los steps de publicación de SARIF.
      # continue-on-error : el job NO falla aquí. El fallo se controla en el
      #                     step "Verificar modo estricto", después del SARIF upload.
      # .semgrepignore    : Semgrep lo lee automáticamente desde $GITHUB_WORKSPACE.
      #                     Coloca el archivo en la raíz del repo.
      - name: Semgrep · Backend (/api)
        id: semgrep_backend
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --verbose \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --config=p/typescript \
            --config=p/nodejs \
            ${{ steps.custom_rules.outputs.flag }} \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=coverage \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            --sarif --output=results-backend.sarif \
            ./api

      # ── Semgrep Frontend (/app) ──────────────────────────────────────
      # Packs: p/ci · p/security-audit · p/secrets · p/javascript · p/react
      - name: Semgrep · Frontend (/app)
        id: semgrep_frontend
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --verbose \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --config=p/javascript \
            --config=p/react \
            ${{ steps.custom_rules.outputs.flag }} \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=coverage \
            --exclude=.vite \
            --exclude=.turbo \
            --exclude=.next \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            --sarif --output=results-frontend.sarif \
            ./app

      # ── Publicar SARIF — siempre, incluso si los scans fallaron ──────
      # Con continue-on-error en los steps de scan, estos steps siempre
      # alcanzan ejecución y el Security tab de GitHub recibe los datos.
      - name: Publicar SARIF Backend
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-backend.sarif
          category: semgrep-backend

      - name: Publicar SARIF Frontend
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-frontend.sarif
          category: semgrep-frontend

      # ── Enforce modo estricto (DESPUÉS de publicar SARIF) ───────────
      # Este step reemplaza completamente a --error:
      #   · El SARIF ya está en el Security tab antes de que el job falle.
      #   · Solo falla si estamos en rama protegida (strict=true).
      #   · Imprime un link directo al code scanning del repo.
      - name: Verificar modo estricto
        if: steps.policy.outputs.strict == 'true'
        run: |
          FAILED=false

          if [ "${{ steps.semgrep_backend.outcome }}" = "failure" ]; then
            echo "❌ Semgrep Backend encontró findings. Revisa el Security tab."
            FAILED=true
          fi

          if [ "${{ steps.semgrep_frontend.outcome }}" = "failure" ]; then
            echo "❌ Semgrep Frontend encontró findings. Revisa el Security tab."
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "👉 Code scanning: https://github.com/${{ github.repository }}/security/code-scanning"
            exit 1
          fi

          echo "✅ Semgrep sin findings bloqueantes en modo estricto."