name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  semgrep:
    name: "SAST · Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # 🔹 Regla inline para detectar eval
      - name: Crear regla Semgrep (no-eval)
        run: |
          cat <<'EOF' > no-eval.yml
          rules:
            - id: no-eval-usage
              name: Detectar uso de eval()
              message: "Evita usar eval(), puede introducir vulnerabilidades (RCE)."
              severity: ERROR
              languages:
                - javascript
                - typescript
              pattern: eval($X)
              metadata:
                category: security
                cwe: "CWE-95"
          EOF

      # 🔹 Determinar política
      - name: Determinar política
        id: policy
        run: |
          STRICT="false"
          BASELINE=""

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "main" ]; then
            STRICT="true"
          fi

          if [ "${{ github.ref }}" = "refs/heads/main" ] \
          || echo "${{ github.ref }}" | grep -qE '^refs/heads/release/|^refs/heads/hotfix/'; then
            STRICT="true"
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "develop" ]; then
            BASELINE="--baseline-commit=origin/develop"
          fi

          echo "strict=$STRICT"     >> $GITHUB_OUTPUT
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT

      # 🔹 Backend scan
      - name: Semgrep · Backend (/api)
        run: |
          STRICT_FLAGS=""
          if [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            STRICT_FLAGS="--error --severity=ERROR"
          fi

          semgrep scan \
            --verbose \
            --config=no-eval.yml \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/typescript \
            --config=p/nodejs \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=coverage \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            $STRICT_FLAGS \
            --json --output=results-backend.json \
            --sarif --output=results-backend.sarif \
            ./api

      # 🔹 Frontend scan
      - name: Semgrep · Frontend (/app)
        run: |
          STRICT_FLAGS=""
          if [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            STRICT_FLAGS="--error --severity=ERROR"
          fi

          semgrep scan \
            --verbose \
            --config=no-eval.yml \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/javascript \
            --config=p/react \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=coverage \
            --exclude=.vite \
            --exclude=.turbo \
            --exclude=.next \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            $STRICT_FLAGS \
            --sarif --output=results-frontend.sarif \
            ./app

      - name: Publicar SARIF Backend
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-backend.sarif
          category: semgrep-backend

      - name: Publicar SARIF Frontend
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-frontend.sarif
          category: semgrep-frontend
