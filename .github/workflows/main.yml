name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  # ----------------------------------------------------------
  # 4. SEMGREP SAST
  # ----------------------------------------------------------
  semgrep:
    name: "SAST · Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ── Login condicional con Semgrep Cloud ──────────────────────────
      # Configura SEMGREP_APP_TOKEN en Settings → Secrets → Actions para activar:
      #   · Políticas gestionadas desde el dashboard de Semgrep App
      #   · Sincronización de findings a Semgrep Cloud
      #   · Posibilidad de usar --config=policy en lugar de packs individuales
      #
      # Sin el token, el job continúa usando los packs públicos + reglas locales.
      # El token se pasa también como env var en los steps de scan para que
      # Semgrep lo use durante el escaneo (autenticación automática en semgrep >= 1.x).
      - name: Semgrep Login (Cloud — condicional)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          if [ -n "$SEMGREP_APP_TOKEN" ]; then
            semgrep login
            echo "SEMGREP_AUTHENTICATED=true" >> $GITHUB_ENV
            echo "✅ Autenticado con Semgrep Cloud"
          else
            echo "SEMGREP_AUTHENTICATED=false" >> $GITHUB_ENV
            echo "ℹ️  Sin SEMGREP_APP_TOKEN — usando reglas públicas y locales únicamente"
          fi

      # ── Reglas personalizadas ────────────────────────────────────────
      # Crea .semgrep/rules/ en la raíz del repo y coloca archivos YAML con
      # tus reglas. Ejemplo de estructura:
      #
      #   .semgrep/
      #   ├── rules/
      #   │   ├── no-console-log.yml
      #   │   ├── enforce-dto-validation.yml
      #   │   └── no-hardcoded-secrets.yml
      #   └── .semgrepignore   ← leído automáticamente por Semgrep
      #
      # Si .semgrep/rules/ está vacío o no existe, el flag queda vacío y
      # los scans corren solo con los packs oficiales.
      - name: Detectar reglas personalizadas
        id: custom_rules
        run: |
          CUSTOM_FLAG=""
          if [ -d ".semgrep/rules" ] && [ "$(ls -A .semgrep/rules 2>/dev/null)" ]; then
            CUSTOM_FLAG="--config=.semgrep/rules"
            echo "📁 Reglas personalizadas detectadas en .semgrep/rules/"
            ls .semgrep/rules/
          else
            echo "ℹ️  Sin reglas personalizadas (.semgrep/rules/ vacío o no encontrado)"
          fi
          echo "flag=$CUSTOM_FLAG" >> $GITHUB_OUTPUT

      # ── Política de escaneo ──────────────────────────────────────────
      - name: Determinar política
        id: policy
        run: |
          STRICT="false"
          BASELINE=""

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "main" ]; then
            STRICT="true"
          fi

          if [ "${{ github.ref }}" = "refs/heads/main" ] \
          || echo "${{ github.ref }}" | grep -qE '^refs/heads/release/|^refs/heads/hotfix/'; then
            STRICT="true"
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "develop" ]; then
            BASELINE="--baseline-commit=origin/develop"
          fi

          echo "strict=$STRICT"     >> $GITHUB_OUTPUT
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT

      # ── Semgrep Backend (/api) ───────────────────────────────────────
      # Packs: p/ci · p/security-audit · p/secrets · p/typescript · p/nodejs
      #
      # --verbose        : log detallado de reglas aplicadas y archivos procesados.
      # --severity=ERROR : filtra el SARIF a findings de nivel ERROR únicamente.
      # || true          : semgrep sin --error siempre sale con 0; el || true
      #                    garantiza que el SARIF se genere y el script no aborte.
      # Inspección SARIF : se cuenta results[] en el SARIF para detectar findings
      #                    reales y fallar el step en modo estricto.
      # .semgrepignore   : Semgrep lo lee automáticamente desde $GITHUB_WORKSPACE.
      - name: Semgrep · Backend (/api)
        id: scan_backend
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --verbose \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/typescript \
            --config=p/nodejs \
            ${{ steps.custom_rules.outputs.flag }} \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=coverage \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            --severity=ERROR \
            --sarif --output=results-backend.sarif \
            ./api || true

          FINDINGS=$(python3 -c "
          import json
          sarif = json.load(open('results-backend.sarif'))
          print(sum(len(r.get('results', [])) for r in sarif.get('runs', [])))
          ")

          echo "Findings backend: $FINDINGS"

          if [ "$FINDINGS" -gt "0" ] && [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            echo "❌ Semgrep Backend: $FINDINGS finding(s) con severidad ERROR."
            echo "👉 Code scanning: https://github.com/${{ github.repository }}/security/code-scanning"
            exit 1
          fi

      # ── Semgrep Frontend (/app) ──────────────────────────────────────
      # Packs: p/ci · p/security-audit · p/secrets · p/javascript · p/react
      - name: Semgrep · Frontend (/app)
        id: scan_frontend
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --verbose \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/javascript \
            --config=p/react \
            ${{ steps.custom_rules.outputs.flag }} \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=coverage \
            --exclude=.vite \
            --exclude=.turbo \
            --exclude=.next \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            --severity=ERROR \
            --sarif --output=results-frontend.sarif \
            ./app || true

          FINDINGS=$(python3 -c "
          import json
          sarif = json.load(open('results-frontend.sarif'))
          print(sum(len(r.get('results', [])) for r in sarif.get('runs', [])))
          ")

          echo "Findings frontend: $FINDINGS"

          if [ "$FINDINGS" -gt "0" ] && [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            echo "❌ Semgrep Frontend: $FINDINGS finding(s) con severidad ERROR."
            echo "👉 Code scanning: https://github.com/${{ github.repository }}/security/code-scanning"
            exit 1
          fi

      # ── Publicar SARIF — siempre, incluso si los scans fallaron ──────
      # if: always() garantiza que el Security tab reciba los datos
      # independientemente del resultado de los steps de scan.
      # El gate propaga los fallos que continue-on-error absorbió para
      # que el job quede en rojo si algún scan falló en modo estricto.
      - name: Publicar SARIF Backend
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-backend.sarif
          category: semgrep-backend

      - name: Publicar SARIF Frontend
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-frontend.sarif
          category: semgrep-frontend

      - name: Propagar fallos de scans
        if: always()
        run: |
          if [ "${{ steps.scan_backend.outcome }}" = "failure" ] || [ "${{ steps.scan_frontend.outcome }}" = "failure" ]; then
            exit 1
          fi